---
layout: default
---
{%- include logo.html size=210 -%}
<header>
  <h1 style="line-height: 1; font-size: clamp(1.6rem, 7vw, 2.6rem); margin: 0.6em 0;">{{ site.title }}<br><span style="font-family: serif; font-size: 0.8em;">D ì <span style="position: relative; display: inline-block;">l<span aria-hidden="true" style="position: absolute; left: 100%; transform: translateX(-50%) rotate(-18deg); top: 1.6em; font-size: 0.75em; line-height: 1; letter-spacing: -0.1em;">⌣</span></span> í p</span></h1>
  {%-if site.theme_config.show_description-%}
    <p>{{ site.description }}</p>
  {%-endif-%}

</header>

{%-include menu_item.html collection=site.data.menu.entries-%}

{{ content }}

<div class="bottom-links">
  <a href="{{ site.data.profile.linkedin }}">profile</a>
  <a href="{{ site.data.profile.github }}">my code</a>
  <a href="{{ site.data.profile.resume }}">on paper</a>
  <a href="mailto:{{ site.data.profile.email }}" class="hire-me-link" aria-label="hire me"><canvas id="hire-me-canvas"></canvas></a>
  <style>
    .bottom-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 0.6rem 0.9rem;
      padding-right: 1rem;
      margin-bottom: 0.5rem;
    }
    .hire-me-link {
      display: inline-block;
      vertical-align: middle;
      line-height: 1;
      text-decoration: none;
      font-size: 1.25em;
    }
    #hire-me-canvas {
      display: block;
      width: 4.2em;
      height: 1.1em;
      vertical-align: middle;
      -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 84 22'><text x='42' y='17' text-anchor='middle' font-family='monospace' font-size='16' font-weight='700' fill='black'>hire me</text></svg>");
              mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 84 22'><text x='42' y='17' text-anchor='middle' font-family='monospace' font-size='16' font-weight='700' fill='black'>hire me</text></svg>");
      -webkit-mask-size: 100% 100%;
              mask-size: 100% 100%;
      -webkit-mask-repeat: no-repeat;
              mask-repeat: no-repeat;
      -webkit-mask-position: center;
              mask-position: center;
    }
  </style>
</div>
