---
layout: default
---
{%- include logo.html size=170 -%}
<style>
  .hero-title {
    line-height: 1.35;
    font-size: clamp(1.6rem, 7vw, 2.6rem);
    margin: 0.6em 0;
  }
  .dilip-name {
    font-family: serif;
    font-size: 0.8em;
  }
  .dilip-l {
    position: relative;
    display: inline-block;
    line-height: 1;
  }
  .dilip-smile {
    position: absolute;
    left: 90%;
    top: 1.9em;
    transform: translateX(-50%) rotate(-18deg);
    transform-origin: 50% 0;
    font-size: 0.6em;
    line-height: 1;
    font-family: serif;
    letter-spacing: -0.1em;
    pointer-events: none;
  }
  @media (max-width: 600px) {
    .hero-title { line-height: 1.45; }
    .dilip-smile { top: 0.9em; font-size: 0.7em; }
  }
</style>
<header>
  <h1 class="hero-title">{{ site.title }}<br><span class="dilip-name">D ì <span class="dilip-l">l<span class="dilip-smile" aria-hidden="true">⌣</span></span> í p</span></h1>
  {%-if site.theme_config.show_description-%}
    <p>{{ site.description }}</p>
  {%-endif-%}

</header>

{%-include menu_item.html collection=site.data.menu.entries-%}

{{ content }}

<div class="bottom-links">
  <a href="{{ site.data.profile.linkedin }}">profile</a>
  <a href="{{ site.data.profile.resume }}">on paper</a>
  <a href="mailto:{{ site.data.profile.email }}" class="hire-me-link" aria-label="hire me"><canvas id="hire-me-canvas"></canvas></a>
  <style>
    .bottom-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 0.6rem 0.9rem;
      padding-right: 1rem;
      margin-bottom: 0.5rem;
    }
    .hire-me-link {
      display: inline-block;
      vertical-align: middle;
      line-height: 1;
      text-decoration: none;
      font-size: 1.1em;
    }
    #hire-me-canvas {
      display: block;
      width: 5.2em;
      height: 1.4em;
      vertical-align: middle;
      -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 84 22'><text x='42' y='17' text-anchor='middle' font-family='monospace' font-size='16' font-weight='700' fill='black'>hire me</text></svg>");
              mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 84 22'><text x='42' y='17' text-anchor='middle' font-family='monospace' font-size='16' font-weight='700' fill='black'>hire me</text></svg>");
      -webkit-mask-size: 100% 100%;
              mask-size: 100% 100%;
      -webkit-mask-repeat: no-repeat;
              mask-repeat: no-repeat;
      -webkit-mask-position: center;
              mask-position: center;
    }
  </style>
</div>
