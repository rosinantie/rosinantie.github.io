<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{{ page.title | default: "shader" }}</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #shader-canvas {
        position: fixed;
        inset: 0;
        display: block;
        width: 100vw;
        height: 100vh;
        height: 100svh;
        height: 100dvh;
        touch-action: none;
      }
      .shader-back {
        position: fixed;
        top: calc(14px + env(safe-area-inset-top, 0px));
        left: calc(14px + env(safe-area-inset-left, 0px));
        color: #fff;
        font: 600 15px/1 system-ui, -apple-system, sans-serif;
        text-decoration: none;
        mix-blend-mode: difference;
        padding: 10px 14px;
        margin: -10px -14px;
        min-width: 44px;
        min-height: 44px;
        box-sizing: border-box;
        display: inline-flex;
        align-items: center;
        touch-action: manipulation;
      }
      .shader-back:active { opacity: 0.6; }
    </style>
  </head>
  <body>
    <canvas id="shader-canvas"></canvas>
    <a class="shader-back" href="{{ site.baseurl }}/shaders/">← shaders</a>
    <script>
      // Re-fire window resize when iOS URL bar collapses, on orientation change,
      // or when the visual viewport changes (keyboard, pinch zoom). Shader JS
      // files only need to listen to 'resize' to stay correctly sized.
      (function () {
        var refire = function () { window.dispatchEvent(new Event('resize')); };
        window.addEventListener('orientationchange', refire);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', refire);
        }
      })();
    </script>
    {% if page.custom_js %}
      {% for js_file in page.custom_js %}
        <script src="{{ site.baseurl }}/assets/js/{{ js_file }}.js?v={{ site.time | date: '%s' }}"></script>
      {% endfor %}
    {% endif %}
  </body>
</html>
